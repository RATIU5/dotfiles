import = ["/Users/ratiu5/.config/alacritty/themes/rose-pine.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 20.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"

[[keyboard.bindings]]
action = "ScrollLineUp"
key = "PageUp"

[[keyboard.bindings]]
action = "ScrollLineDown"
key = "PageDown"

[window]
decorations = "buttonless"
opacity = 1.0
startup_mode = "Windowed"
title = "Terminal"
